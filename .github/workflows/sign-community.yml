name: Sign Community Manifest

on:
  push:
    branches: [main]
    paths:
      - 'community/**'
      - '!community/MANIFEST.sha256'

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cryptography

      - name: Generate and sign manifest
        env:
          COMMUNITY_SIGNING_KEY: ${{ secrets.COMMUNITY_SIGNING_KEY }}
        run: |
          python -c "
          import base64, hashlib, os
          from pathlib import Path
          from cryptography.hazmat.primitives.serialization import load_pem_private_key

          community = Path('community')
          # Secret is base64-encoded PEM (GitHub secrets can't store raw PEM)
          pem = base64.b64decode(os.environ['COMMUNITY_SIGNING_KEY'])
          private_key = load_pem_private_key(pem, password=None)

          # Generate manifest
          lines = []
          for path in sorted(community.rglob('*')):
              if not path.is_file():
                  continue
              if path.name in ('MANIFEST.sha256', '.gitkeep'):
                  continue
              rel = path.relative_to(community).as_posix()
              h = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f'{h}  {rel}')

          manifest = '\n'.join(lines)

          # Sign with Ed25519
          sig_bytes = private_key.sign(manifest.encode('utf-8'))
          sig_b64 = base64.b64encode(sig_bytes).decode('ascii')
          signed = f'{manifest}\n# SIGNATURE: {sig_b64}'

          Path('community/MANIFEST.sha256').write_text(signed, encoding='utf-8')
          print(f'Signed manifest: {len(lines)} files (Ed25519)')
          "

      - name: Commit signed manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community/MANIFEST.sha256
          git diff --cached --quiet || git commit -m "chore: update signed community manifest"
          git push
