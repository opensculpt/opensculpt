name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check agos/ tests/
      - name: Test
        run: >
          pytest tests/ -v --tb=short -p no:faulthandler
          --ignore=tests/test_frontend_playwright.py
          --ignore=tests/test_user_stories.py
          --ignore=tests/test_scenario_live.py
          --ignore=tests/test_services_e2e.py
          --ignore=tests/test_ui_bugs.py
          --cov=agos --cov-report=xml
        env:
          PYTHONDONTWRITEBYTECODE: 1
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agos/ tests/
