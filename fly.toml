app = "opensculpt-live"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SCULPT_DASHBOARD_HOST = "0.0.0.0"
  SCULPT_DASHBOARD_PORT = "8420"
  SCULPT_SPECTATOR_MODE = "true"
  SCULPT_DEFAULT_MODEL = "anthropic/claude-sonnet-4-5"
  SCULPT_EVOLUTION_LLM_PROVIDER = "anthropic"
  SCULPT_APPROVAL_MODE = "auto"
  SCULPT_LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8420
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/api/status"
  timeout = "5s"

[mounts]
  source = "opensculpt_data"
  destination = "/app/.opensculpt"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
